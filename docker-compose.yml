version: '3.8'

services:
  app:
    build: .
    container_name: print_tech_os
    restart: always
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=sua_senha_segura
      - DB_NAME=sistema_orcamento
      - JWT_SECRET=sua_string_longa_da_bitsz
      - JWT_EXPIRES_IN=8h
    ports:
      - "3000:5000"
    depends_on:
      - db
    networks:
      - printtech_net

  db:
    image: mysql:8.0
    container_name: mysql_os
    restart: always
    environment:
      MYSQL_DATABASE: sistema_orcamento
      MYSQL_ROOT_PASSWORD: sua_senha_segura
    ports:
      - "3306:3306"
    volumes:
      - os_db_data:/var/lib/mysql
    networks:
      - printtech_net

networks:
  printtech_net:
    driver: bridge

volumes:
  os_db_data: